<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>누리RP | VC 조합 관리</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <span class="brand-mark">NR</span>
          <div>
            <strong>누리RP</strong>
            <small>VC 조합 관리</small>
          </div>
        </div>
        <nav class="nav" aria-label="주요 화면">
          <button class="nav-item active" data-view="dashboard">대시보드</button>
          <button class="nav-item" data-view="funds">조합</button>
          <button class="nav-item" data-view="companies">포트폴리오사</button>
          <button class="nav-item" data-view="lps">LP</button>
        </nav>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <p class="eyebrow">Internal Portfolio Command Center</p>
            <h1 id="page-title">대시보드</h1>
          </div>
          <div class="topbar-actions">
            <button class="ghost-button" id="reset-data">시드 데이터 초기화</button>
            <button class="primary-button" id="primary-action">조합 추가</button>
          </div>
        </header>

        <section id="view-root" class="view-root" aria-live="polite"></section>
      </main>
    </div>

    <div class="modal-backdrop hidden" id="modal-backdrop">
      <section class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <div class="modal-header">
          <h2 id="modal-title"></h2>
          <button class="icon-button" id="modal-close" aria-label="닫기">×</button>
        </div>
        <form id="modal-form" class="form-grid"></form>
      </section>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
