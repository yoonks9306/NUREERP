<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NUREERP | VC 조합 관리</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 64 64" role="img">
              <defs>
                <linearGradient id="nureerp-logo-gradient" x1="8" x2="56" y1="8" y2="56">
                  <stop offset="0" stop-color="#0f6f68" />
                  <stop offset="0.58" stop-color="#59436f" />
                  <stop offset="1" stop-color="#bf5a4b" />
                </linearGradient>
              </defs>
              <rect width="64" height="64" rx="16" fill="url(#nureerp-logo-gradient)" />
              <path d="M18 44V18h7l15 21V18h7v26h-7L25 23v21h-7Z" fill="#ffffff" />
              <circle cx="18" cy="18" r="4" fill="#ecfeff" />
              <circle cx="47" cy="18" r="4" fill="#f5f3ff" />
              <circle cx="47" cy="44" r="4" fill="#eff6ff" />
            </svg>
          </span>
          <div>
            <strong>NUREERP</strong>
            <small>VC 조합 관리</small>
          </div>
        </div>
        <nav class="nav" aria-label="주요 화면">
          <button class="nav-item active" data-view="dashboard">대시보드</button>
          <button class="nav-item" data-view="funds">조합</button>
          <button class="nav-item" data-view="companies">포트폴리오사</button>
          <button class="nav-item" data-view="lps">LP</button>
          <button class="nav-item" data-view="projects">Projects</button>
        </nav>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <p class="eyebrow">NUREERP Portfolio OS</p>
            <h1 id="page-title">대시보드</h1>
          </div>
          <div class="topbar-actions">
            <button class="ghost-button" id="reset-data">시드 데이터 초기화</button>
            <button class="primary-button" id="primary-action">조합 추가</button>
          </div>
        </header>

        <section id="view-root" class="view-root" aria-live="polite"></section>
      </main>
    </div>

    <div class="modal-backdrop hidden" id="modal-backdrop">
      <section class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <div class="modal-header">
          <h2 id="modal-title"></h2>
          <button class="icon-button" id="modal-close" aria-label="닫기">×</button>
        </div>
        <form id="modal-form" class="form-grid"></form>
      </section>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
